name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  # Job 1: Self-hosted runner — build, push to local registry, deploy to k3s
  deploy:
    runs-on: arc-runner-set
    # Only run if the self-hosted runner is available (this job will be skipped
    # if no runner picks it up within the timeout)
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -t 10.0.0.110:30500/csherman-net:${{ github.sha }} \
            -t 10.0.0.110:30500/csherman-net:latest .

      - name: Push to local registry
        run: |
          docker push 10.0.0.110:30500/csherman-net:${{ github.sha }}
          docker push 10.0.0.110:30500/csherman-net:latest

      - name: Deploy to k3s
        run: |
          kubectl set image deployment/csherman-net -n apps \
            web=10.0.0.110:30500/csherman-net:${{ github.sha }}
          kubectl rollout status deployment/csherman-net -n apps --timeout=120s

  # Job 2: GitHub-hosted fallback — build and push to GHCR only
  ghcr-backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Metadata for GHCR
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/csherman.net
          tags: |
            type=sha
            type=raw,value=latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

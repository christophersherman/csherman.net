name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: arc-runner-csherman
    steps:
      - uses: actions/checkout@v4

      - name: Configure insecure registry
        run: |
          echo '{"insecure-registries":["10.0.0.110:30500"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker || sudo kill -SIGHUP $(pidof dockerd) || true
          sleep 3

      - name: Build image
        run: |
          docker build \
            -t 10.0.0.110:30500/csherman-net:${{ github.sha }} \
            -t 10.0.0.110:30500/csherman-net:latest .

      - name: Push to local registry
        run: |
          docker push 10.0.0.110:30500/csherman-net:${{ github.sha }}
          docker push 10.0.0.110:30500/csherman-net:latest

      - name: Deploy to k3s
        run: |
          kubectl set image deployment/csherman-net -n apps \
            web=10.0.0.110:30500/csherman-net:${{ github.sha }}
          kubectl rollout status deployment/csherman-net -n apps --timeout=120s

  ghcr-backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/csherman.net:latest

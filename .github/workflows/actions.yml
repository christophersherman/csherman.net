name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: arc-runner-csherman
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Docker and configure insecure registry
        run: |
          for i in $(seq 1 30); do
            docker info >/dev/null 2>&1 && break
            sleep 2
          done
          docker buildx create --name insecure --driver docker-container \
            --driver-opt network=host \
            --config /dev/stdin <<TOMLEOF
          [registry."10.0.0.110:30500"]
            http = true
          TOMLEOF
          docker buildx use insecure

      - name: Build and push
        run: |
          docker buildx build \
            --push \
            --output type=image,push=true,registry.insecure=true \
            -t 10.0.0.110:30500/csherman-net:${{ github.sha }} \
            -t 10.0.0.110:30500/csherman-net:latest .

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Deploy to k3s
        run: |
          kubectl --kubeconfig=/dev/null --server=https://10.0.0.110:6443 \
            --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || echo "") \
            --insecure-skip-tls-verify \
            set image deployment/csherman-net -n apps \
            web=10.0.0.110:30500/csherman-net:${{ github.sha }} || \
          echo "kubectl deploy skipped - run manually: kubectl set image deployment/csherman-net -n apps web=10.0.0.110:30500/csherman-net:${{ github.sha }}"

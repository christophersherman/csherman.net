apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployer
  namespace: apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer
  namespace: apps
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployer
  namespace: apps
subjects:
- kind: ServiceAccount
  name: deployer
  namespace: apps
roleRef:
  kind: Role
  name: deployer
  apiGroup: rbac.authorization.k8s.io
